server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy Supabase auth requests to backend
    location /auth/v1/ {
        proxy_pass https://mxulkceagajs.sealoshzh.site/auth/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host mxulkceagajs.sealoshzh.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to backend
    location /api/v1/ {
        proxy_pass https://mxulkceagajs.sealoshzh.site/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host mxulkceagajs.sealoshzh.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
